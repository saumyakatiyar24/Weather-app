<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-blue-500 to-indigo-900 min-h-screen flex items-center justify-center p-4 text-white font-sans">

    <div class="bg-white/10 backdrop-blur-md border border-white/20 p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-center mb-6 tracking-wide">
            <i class="fa-solid fa-cloud-sun text-yellow-300 mr-2"></i>Weather App
        </h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-blue-200">City Name</label>
                <div class="relative">
                    <input id="city-input" type="text" placeholder="Enter city e.g. Lucknow" class="w-full pl-10 pr-4 py-2.5 bg-white/20 border border-white/10 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder-white/50 text-white">
                    <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3.5 text-white/50"></i>
                </div>
            </div>
            <button onclick="getWeather()" class="w-full bg-blue-500 hover:bg-blue-600 active:scale-[0.98] transition-all py-3 rounded-lg font-semibold shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2 cursor-pointer">
                Get Weather Info
            </button>
        </div>

        <div id="weather-card" class="mt-8 hidden border-t border-white/10 pt-6 animate-fade-in">
            <div class="text-center">
                <h2 id="city-name" class="text-2xl font-bold text-white">Location</h2>
                <p id="weather-desc" class="text-blue-200 capitalize text-sm">Clear Sky</p>
                <div class="text-6xl font-extrabold my-4" id="temp-display">0°C</div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mt-6 text-sm bg-black/20 p-4 rounded-xl">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-droplet text-blue-300 text-lg"></i>
                    <div>
                        <p class="text-xs text-blue-200">Humidity</p>
                        <p id="humidity-display" class="font-semibold">0%</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-wind text-gray-300 text-lg"></i>
                    <div>
                        <p class="text-xs text-blue-200">Wind Speed</p>
                        <p id="wind-display" class="font-semibold">0 m/s</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="error-msg" class="mt-4 text-center text-red-300 text-sm hidden font-medium"></div>
    </div>

    <script>
        async function getWeather() {
            const city = document.getElementById('city-input').value.trim();
            const weatherCard = document.getElementById('weather-card');
            const errorMsg = document.getElementById('error-msg');

           
            const apiKey = "b2df8469db554fe486984831262606"; 

            if(!city) {
                errorMsg.textContent = "Please enter a city name!";
                errorMsg.classList.remove('hidden');
                weatherCard.classList.add('hidden');
                return;
            }

            errorMsg.classList.add('hidden');

            try {
                // Seedhe secure WeatherAPI HTTPS link par fetch request
                const res = await fetch(`https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${city}&aqi=no`);
                
                if (!res.ok) throw new Error("City not found");
                const data = await res.json();

                // Frontend HTML layout ke mutabik data mapping
                document.getElementById('city-name').textContent = data.location.name;
                document.getElementById('weather-desc').textContent = data.current.condition.text;
                document.getElementById('temp-display').textContent = `${Math.round(data.current.temp_c)}°C`;
                document.getElementById('humidity-display').textContent = `${data.current.humidity}%`;
                
                // kph ko m/s me badla jaise backend server.js me kiya tha
                const windSpeedMs = parseFloat((data.current.wind_kph / 3.6).toFixed(1));
                document.getElementById('wind-display').textContent = `${windSpeedMs} m/s`;

                weatherCard.classList.remove('hidden');
            } catch (err) {
                errorMsg.textContent = "Failed to fetch weather data. Please enter a valid city name.";
                errorMsg.classList.remove('hidden');
                weatherCard.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
